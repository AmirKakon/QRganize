# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up API base URL
        run: echo "REACT_APP_API_BASE_URL=${{ secrets.API_BASE_URL }}" >> $GITHUB_ENV

      - name: Set up google analytics tracking id
        run: echo "REACT_APP_GA_TRACKING_ID=${{ secrets.GA_TRACKING_ID }}" >> $GITHUB_ENV

      - name: Set up default username
        run: echo "REACT_APP_DEFAULT_USERNAME=${{ secrets.DEFAULT_USERNAME }}" >> $GITHUB_ENV
        
      - run: npm ci && npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_QRGANIZE_F651B }}'
          channelId: live
          projectId: qrganize-f651b

      # Deploy the Cloud Functions backend (the hosting action above only ships
      # the frontend). Requires the service account to have Cloud Functions
      # deploy permissions (see note below).
      - name: Install functions dependencies
        run: npm --prefix functions ci

      # functions/.env is gitignored, so write it from a secret at deploy time —
      # otherwise CI deploys ship without GEMINI_KEY and the AI endpoint 500s.
      - name: Write functions environment
        run: echo "GEMINI_KEY=${{ secrets.GEMINI_KEY }}" > functions/.env

      - name: Deploy Cloud Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_QRGANIZE_F651B }}' > "$HOME/firebase-key.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-key.json"
          npx firebase-tools deploy --only functions --project qrganize-f651b --non-interactive
